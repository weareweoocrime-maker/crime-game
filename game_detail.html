<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جزئیات بازی</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
}

.images-row {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
}

.images-row img {
  width: 45%;
  max-width: 400px;
  border-radius: 15px;
}

.summary {
  margin-top: 20px;
  font-size: 16px;
  line-height: 1.6;
  direction: ltr;
  text-align: left;
}

/* دکمه ثبت سفارش */
.order-btn {
  margin-top: 25px;
  padding: 14px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}

.order-btn:hover {
  background: #e60000;
}
</style>
</head>
<body>

<div class="container">

  <div class="images-row">
    <img src="before.png" alt="قبل از فردا">
    <img src="Sam.png" alt="Sam">
  </div>

  <div class="summary">
    متن خلاصه بازی از چپ به راست
  </div>

  <button class="order-btn" onclick="location.href='order.html'">ثبت سفارش</button>

</div>

</body>
</html>
