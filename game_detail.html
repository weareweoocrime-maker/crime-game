<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جزئیات بازی: قبل از فردا</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.container {
  max-width: 900px;
  margin: 40px auto;
  padding: 20px;
  background: rgba(0,0,0,0.75);
  border-radius: 15px;
}

.images {
  display: flex;
  flex-wrap: wrap;
  gap: 20px;
  justify-content: center;
  margin-bottom: 20px;
}

.images img {
  width: 45%;
  border-radius: 14px;
}

.summary {
  font-size: 16px;
  line-height: 1.6;
  direction: ltr; /* متن از چپ به راست */
}
</style>
</head>
<body>

<div class="container">
  <div class="images">
    <img src="before.png" alt="پرونده قبل از فردا">
    <img src="Sam.png" alt="سام">
  </div>

  <div class="summary">
    این بازی یک تجربه جنایی و معمایی است که شما را در مسیر حل پرونده‌ای پیچیده قرار می‌دهد.  
    با پیدا کردن سرنخ‌ها، تحلیل شواهد و تصمیم‌گیری‌های درست، می‌توانید حقیقت را کشف کنید و پرونده را حل کنید.
  </div>
</div>

</body>
</html>
