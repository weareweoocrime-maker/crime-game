<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>جزئیات بازی</title>
<style>
body {
  margin: 0;
  padding: 20px;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.game-images {
  display: flex;
  justify-content: center;
  gap: 20px;
  flex-wrap: wrap;
  margin-bottom: 20px;
}

.game-images img {
  width: 45%;
  max-width: 400px;
  border-radius: 15px;
  display: block;
}

.game-summary {
  font-size: 16px;
  direction: ltr;
  margin-bottom: 20px;
}

.order-btn {
  padding: 15px 25px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}

.order-btn:hover {
  background: #e60000;
}
</style>
</head>
<body>

<h2>جزئیات بازی</h2>

<div class="game-images">
  <img src="before.png" alt="پرونده قبل از فردا">
  <img src="sam.png" alt="تصویر Sam">
</div>

<div class="game-summary">
متن خلاصه بازی: این بازی شامل یک پرونده جنایی است که بازیکن باید با دنبال کردن سرنخ‌ها و حل معماها، حقیقت را کشف کند.
</div>

<button class="order-btn" onclick="location.href='order.html'">ثبت سفارش</button>

</body>
</html>
