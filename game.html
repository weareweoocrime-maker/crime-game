<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه بازی‌ها</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.game-container {
  max-width: 500px;
  margin: 40px auto;
  padding: 20px;
}

.game-box {
  position: relative;
  margin-bottom: 20px;
}

.game-box img {
  width: 100%;
  border-radius: 15px;
  display: block;
}

.game-title {
  margin-top: 10px;
  font-size: 18px;
  font-family: 'Tahoma', sans-serif;
  font-weight: bold;
}

.cart-btn {
  margin-top: 12px;
  padding: 12px 20px;
  font-size: 22px; /* سایز بزرگ برای ایموجی */
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}

.cart-btn:hover {
  background: #e60000;
}
</style>
</head>
<body>

<div class="game-container">
  <div class="game-box">
    <img src="before.png" alt="پرونده قبل از فردا">
    <div class="game-title">پرونده جنایی قبل از فردا</div>
    <button class="cart-btn" onclick="location.href='game_detail.html'">🛒</button>
  </div>
</div>

</body>
</html>
