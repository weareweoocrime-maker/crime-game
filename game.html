<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه بازی‌ها</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

.container {
  max-width: 800px;
  margin: 40px auto;
  padding: 20px;
}

.game-card {
  position: relative;
  margin: 20px auto;
  width: 90%;
  max-width: 400px;
}

.game-card img {
  width: 100%;
  border-radius: 15px;
}

.game-card .title {
  margin-top: 10px;
  font-family: "Tahoma", cursive;
  font-size: 20px;
  color: #fff;
  text-align: center;
}

.cart {
  margin-top: 15px;
  width: 50px;
  height: 50px;
  background: url('cart.png') no-repeat center center;
  background-size: contain;
  cursor: pointer;
  margin-left: auto;
  margin-right: auto;
}
</style>
</head>
<body>

<div class="container">
  <div class="game-card">
    <img src="before.png" alt="پرونده قبل از فردا" onclick="goToDetail()">
    <div class="title">پرونده جنایی قبل از فردا</div>
    <div class="cart" onclick="goToDetail()"></div>
  </div>
</div>

<script>
function goToDetail() {
  window.location.href = "game_detail.html";
}
</script>

</body>
</html>
