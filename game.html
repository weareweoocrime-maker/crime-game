<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه بازی‌ها</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: url("heroo.jpg") center/cover no-repeat; /* عکس پس زمینه اضافه شد */
  color: #fff;
  text-align: center;
}

/* باکس بازی */
.game-box {
  position: relative;
  margin: 40px auto 20px;
  width: 90%;
  max-width: 400px;
  cursor: pointer;
}
.game-box img {
  width: 100%;
  border-radius: 15px;
  display: block;
}
.game-box button {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}
.game-box button:hover {
  background: #e60000;
}

/* عنوان زیر تصویر */
.game-title {
  margin-top: 10px;
  font-size: 20px;
  font-family: "B Nazanin", Tahoma, sans-serif; /* فونت تحریری */
}

/* دکمه سبد خرید */
.cart-btn {
  margin-top: 15px;
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}
.cart-btn:hover {
  background: #e60000;
}
</style>
</head>
<body>

<div class="game-box">
  <img src="before.png" alt="پرونده جنایی قبل از فردا">
  <div class="game-title">پرونده جنایی قبل از فردا</div>
  <button class="cart-btn" onclick="location.href='game_detail.html'">🛒</button>
</div>

</body>
</html>
