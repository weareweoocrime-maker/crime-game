<title>صفحه اصلی Weareweoo</title>
<style>
body {
  margin: 0;
  padding: 0;
  font-family: Tahoma, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
}

/* جمله بالای دکمه */
.header-text {
  margin-top: 40px;
  font-size: 22px;
  font-weight: bold;
  direction: ltr;
  color: #fff;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
}

/* دکمه با عکس */
.game-box {
  position: relative;
  margin: 40px auto 20px;
  width: 90%;
  max-width: 400px;
  cursor: pointer;
}
.game-box img {
  width: 100%;
  border-radius: 15px;
  display: block;
}
.game-box button {
  position: absolute;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 20px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
}
.game-box button:hover {
  background: #e60000;
}
