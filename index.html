<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه اصلی تیم</title>
<style>
html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    font-family: Tahoma, sans-serif;
    color: #fff;
}

body{
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    background-color: #0a0a0a;
    padding: 20px;
}

.container {
    width: 90%;
    max-width: 500px;
    text-align: center;
}

.header-img {
    width: 100%;
    border-radius: 15px;
    margin-bottom: 20px;
}

.mysterious-text {
    font-size: 20px;
    margin-bottom: 20px;
    direction: ltr;
    text-align: center;
    font-style: italic;
}

button {
    width: 100%;
    padding: 14px;
    font-size: 16px;
    border: none;
    border-radius: 10px;
    background: #b30000;
    color: #fff;
    cursor: pointer;
    margin-bottom: 25px;
}

button:hover {
    background: #e60000;
}

.team-text {
    font-size: 16px;
    line-height: 1.6;
    background: rgba(0,0,0,0.7);
    padding: 15px;
    border-radius: 12px;
    direction: ltr;
    text-align: center;
    margin-bottom: 25px;
}

.comments-box {
    width: 100%;
    background: #000;
    padding: 15px;
    border-radius: 12px;
    text-align: left;
    max-height: 200px;
    overflow-y: auto;
}
.comments-box h3 {
    text-align: center;
}
</style>
</head>
<body>

<div class="container">

    <!-- عکس پرونده -->
    <img src="crime.jpg" class="header-img" alt="پرونده جنایی">

    <!-- جمله رازآلود -->
    <div class="mysterious-text">
        حقیقت همیشه پنهان نیست؛ گاهی فقط منتظر توست
    </div>

    <!-- دکمه رفتن به صفحه بازی‌ها -->
    <button onclick="location.href='games.html'">رفتن به صفحه بازی‌ها</button>

    <!-- درباره تیم -->
    <div class="team-text">
        تیم ما، WeAreWeoo، گروهی از عاشقان بازی‌های فکری و جنایی است. هدف ما خلق تجربه‌های هیجان‌انگیز و معمایی برای بازیکنان است و هر بازی، داستانی پیچیده و پر از رمز و راز دارد.
    </div>

    <!-- باکس نظرات -->
    <div class="comments-box" id="comments-box">
        <h3>نظرات شما</h3>
        <div id="comments-list"></div>
    </div>

</div>

<script>
// نمونه ذخیره نظرات محلی (Local Storage)
function addComment(comment){
    const list = document.getElementById('comments-list');
    const div = document.createElement('div');
    div.style.borderBottom = "1px solid #444";
    div.style.padding = "5px 0";
    div.innerText = comment;
    list.appendChild(div);
}

// تست: اضافه کردن نمونه نظر
addComment("عالی بود!");
addComment("خیلی جذاب بود!");
</script>

</body>
</html>
