<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه اصلی</title>
<style>
body{
  margin:0;
  font-family: Tahoma, sans-serif;
  background:#000;
  color:#fff;
}
.container{
  max-width: 600px;
  margin:auto;
  padding:20px;
  text-align:center;
}
h1{
  margin-bottom:10px;
}
p{
  margin-bottom:20px;
}
button{
  padding:12px 20px;
  font-size:16px;
  border:none;
  border-radius:8px;
  background:#b30000;
  color:#fff;
  cursor:pointer;
}
button:hover{
  background:#e60000;
}

/* باکس نظرات */
#commentsBox{
  background:#111;
  padding:15px;
  border-radius:12px;
  margin-top:30px;
  text-align:left;
  max-height:300px;
  overflow-y:auto;
}
.comment{
  background:#222;
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}
input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:8px;
  border:none;
  font-size:14px;
}
</style>
</head>
<body>

<div class="container">
  <h1>حقیقت همیشه پنهان نیست، گاهی فقط منتظر توست</h1>
  
  <button onclick="location.href='games.html'">رفتن به صفحه بازی‌ها</button>
  
  <h2>درباره تیم</h2>
  <p style="direction:ltr; text-align:center;">
    تیم ما "WeAreWeoo" با هدف خلق بازی‌های فکری جنایی و معمایی فعالیت می‌کند. بازی‌هایمان ترکیبی از داستان‌های رازآلود، معماهای هیجان‌انگیز و تجربه‌ای چالش‌برانگیز برای کاربران است.
  </p>
  
  <!-- باکس نظرات -->
  <h2>نظرات شما</h2>
  <textarea id="commentInput" placeholder="نظر خود را اینجا بنویسید"></textarea>
  <button onclick="addComment()">ثبت نظر</button>
  
  <div id="commentsBox"></div>
</div>

<script>
function addComment(){
  const input = document.getElementById('commentInput');
  const text = input.value.trim();
  if(text === '') return;
  
  const box = document.getElementById('commentsBox');
  const div = document.createElement('div');
  div.classList.add('comment');
  div.innerText = text;
  box.appendChild(div);
  input.value = '';
}
</script>

</body>
</html>
