<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه اصلی تیم</title>
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Tahoma, sans-serif;
  direction: ltr;
  color: #fff;
}

/* پس‌زمینه */
body {
  background: url('crime.jpg') no-repeat center center;
  background-size: cover;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
}

/* جمله بالای دکمه */
.mysterious-text {
  margin-top: 60px;
  font-size: 24px;
  text-align: center;
  color: #fff;
  text-shadow: 1px 1px 5px rgba(0,0,0,0.7);
  max-width: 90%;
}

/* دکمه رفتن به بازی‌ها */
.button-play {
  margin: 40px 0 20px 0;
  padding: 14px 28px;
  font-size: 18px;
  border: none;
  border-radius: 10px;
  background-color: #b30000;
  color: #fff;
  cursor: pointer;
  transition: 0.3s;
}
.button-play:hover {
  background-color: #e60000;
}

/* باکس درباره تیم */
.about-team {
  background-color: rgba(0,0,0,0.75);
  padding: 20px;
  border-radius: 12px;
  max-width: 90%;
  margin-bottom: 40px;
  text-align: center;
  font-size: 18px;
  line-height: 1.6;
  color: #fff;
}

/* بخش نظرات */
.comments-section {
  width: 90%;
  max-width: 600px;
  margin-bottom: 60px;
  text-align: center;
}

.comment-box {
  background-color: rgba(0,0,0,0.85);
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
  color: #fff;
  text-align: left;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: none;
  font-size: 16px;
}

button.submit-comment {
  padding: 12px 20px;
  border: none;
  border-radius: 8px;
  background-color: #b30000;
  color: #fff;
  font-size: 16px;
  cursor: pointer;
}
button.submit-comment:hover {
  background-color: #e60000;
}
</style>
</head>

<body>

<!-- جمله بالای دکمه -->
<div class="mysterious-text">
حقیقت همیشه پنهان نیست، گاهی فقط منتظر توست
</div>

<!-- دکمه رفتن به صفحه بازی‌ها -->
<button class="button-play" onclick="location.href='games.html'">رفتن به صفحه بازی‌ها</button>

<!-- درباره تیم -->
<div class="about-team">
ما یک گروه حرفه‌ای هستیم که عاشق خلق بازی‌های معمایی و جنایی هستیم. هدف ما ارائه تجربه‌ای هیجان‌انگیز و جذاب است که هم سرگرم‌کننده باشد و هم ذهن شما را به چالش بکشد. هر بازی ما با دقت و خلاقیت طراحی شده تا لحظاتی پرهیجان و به‌یادماندنی بسازد.
</div>

<!-- بخش نظرات -->
<div class="comments-section">
<h3>نظرات شما</h3>
<textarea id="commentInput" placeholder="نظر خود را وارد کنید"></textarea>
<button class="submit-comment" onclick="addComment()">ارسال نظر</button>

<div id="commentsContainer"></div>
</div>

<script>
// اضافه کردن نظر
function addComment() {
  const input = document.getElementById("commentInput");
  const text = input.value.trim();
  if(text === "") return;

  const commentBox = document.createElement("div");
  commentBox.className = "comment-box";
  commentBox.innerText = text;

  document.getElementById("commentsContainer").appendChild(commentBox);
  input.value = "";
}
</script>

</body>
</html>
