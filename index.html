<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>صفحه اصلی تیم</title>

<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazir-font@v30.1.0/dist/font-face.css" rel="stylesheet" type="text/css" />

<style>
html, body {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: 'Vazir', Tahoma, sans-serif;
  background: #fff; /* زمینه ساده برای کل صفحه */
  color: #fff;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* container با پس‌زمینه عکس */
.container {
  width: 90%;
  max-width: 500px;
  margin-top: 50px;
  padding: 20px;
  background: url("crime.jpg") center/cover no-repeat;
  border-radius: 15px;
  text-align: center;
  color: #fff;
  animation: fadeIn 1.5s ease forwards;
  position: relative;
  z-index: 1;
}

/* overlay برای خوانایی متن روی عکس */
.container::before {
  content: "";
  position: absolute;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.5);
  border-radius: 15px;
  z-index: -1;
}

/* جمله بالای دکمه */
.top-text {
  font-size: 18px;
  margin-bottom: 20px;
  color: #fff;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
  direction: ltr;
}

/* دکمه رفتن به صفحه بازی‌ها */
button {
  width: 100%;
  padding: 14px;
  font-size: 16px;
  border: none;
  border-radius: 10px;
  background: #b30000;
  color: #fff;
  cursor: pointer;
  transition: transform 0.3s, background 0.3s;
  margin-bottom: 30px;
  position: relative;
  z-index: 2;
}
button:hover {
  background: #e60000;
  transform: scale(1.05);
}

/* درباره تیم */
.about-team {
  background: rgba(0,0,0,0.85);
  padding: 20px;
  border-radius: 12px;
  font-size: 16px;
  margin-bottom: 30px;
  text-align: center;
  direction: ltr;
  line-height: 1.7;
}

/* باکس نظرات */
.comments-box {
  width: 100%;
  max-width: 500px;
  background: rgba(0,0,0,0.85);
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 50px;
  text-align: left;
  direction: ltr;
}

.comments-box h3 {
  margin-top: 0;
  color: #fff;
  text-align: center;
}

.comment-item {
  background: rgba(50,50,50,0.8);
  margin: 5px 0;
  padding: 8px 12px;
  border-radius: 8px;
  color: #fff;
}
